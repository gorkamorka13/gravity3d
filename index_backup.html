      function drawAxes(xMax, yMax) {
        if (axesHelper) axesHelper.visible = true;
        if (gridHelper) gridHelper.visible = true;
      }

      function makeLabelSprite(text, color = "#ffffff") {
        const canvas = document.createElement("canvas");
        const size = 512; // Augmenté pour éviter la troncature
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "rgba(0,0,0,0)";
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = color;
        ctx.font = "48px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, size / 2, size / 2);
        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(2.5, 2.5, 1);
        sprite.renderOrder = 3;
        return sprite;
      }

      function updateLabel(name, text, position, color = "#ffffff") {
        if (!velocityLabels[name]) {
          const sprite = makeLabelSprite(text, color);
          velocityLabels[name] = sprite;
          scene.add(sprite);
        } else {
          const sprite = velocityLabels[name];
          const canvas = sprite.material.map.image;
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "rgba(0,0,0,0)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = color;
          ctx.font = "48px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(text, canvas.width / 2, canvas.height / 2);
          sprite.material.map.needsUpdate = true;
        }
        velocityLabels[name].position.copy(position);
        velocityLabels[name].visible = true;
      }

      function hideLabels() {
        Object.values(velocityLabels).forEach((s) => (s.visible = false));
      }

      function drawInstantaneousVelocityVectors(state, trajectory, frameIndex) {
        if (!state.showVelocityVectors || !trajectory || trajectory.length === 0) {
          velocityVector.visible = false;
          vxVector.visible = false;
          vyVector.visible = false;
          if (vzVector) vzVector.visible = false;
          hideLabels();
          return;
        }

        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        const simVecColor = isDark ? 0x4facfe : 0x0000ff;
        const compColor = isDark ? 0xcccccc : 0x888888;

        // Ancien code pour déterminer frameIndex, non nécessaire si passé en argument
        // let frameIndex = Math.floor(state.currentFrameIndex);

        function getVelocityAtFrame(traj, index) {
          const n = traj.length;
          if (n === 0) return { vx: 0, vy: 0, vz: 0, v: 0 };
          const i = Math.min(Math.max(0, index), n - 1);

          // Cas sans résistance : formule analytique (plus stable)
          if (!state.isResistanceActive && state.mode === "simulation") {
            const t = i * DT;
            const alphaRad = toRad(state.alpha);
            const betaRad = toRad(state.outOfPlaneAngleDeg || 0);
            const vxy = state.v0 * Math.cos(betaRad);
            const vx = vxy * Math.cos(alphaRad);
            const vy = state.v0 * Math.sin(alphaRad) - state.g * t; // devient négatif en descente
            const vz = state.v0 * Math.sin(betaRad);
            const v = Math.sqrt(vx * vx + vy * vy + vz * vz);
            return { vx, vy, vz, v };
          }

          const getZ = (p) => (p.z !== undefined ? p.z : 0);

          // Mode résistance ou cible : différence arrière (i-1 -> i) pour conserver le signe correct
          let vx = 0, vy = 0, vz = 0;
          if (i > 0) {
            const a = traj[i - 1];
            const b = traj[i];
            const dt = DT;
            vx = (b.x - a.x) / dt;
            vy = (b.y - a.y) / dt;
            vz = (getZ(b) - getZ(a)) / dt;
          } else if (n > 1) {
            const a = traj[0];
            const b = traj[1];
            const dt = DT;
            vx = (b.x - a.x) / dt;
            vy = (b.y - a.y) / dt;
            vz = (getZ(b) - getZ(a)) / dt;
          }

          const v = Math.sqrt(vx * vx + vy * vy + vz * vz);
          return { vx, vy, vz, v };
        }

        const drawVectorSet = (pos, vel, mainColor, componentColor) => {
          const visualScale = state.velocityVectorScale;
          const origin = new THREE.Vector3(pos.x, pos.y, pos.z || 0);

          // Velocity vector (3D)
          const dir = new THREE.Vector3(vel.vx, vel.vy, vel.vz || 0);
          const hasMag = dir.length() > 1e-6;
          if (hasMag) dir.normalize();
          const length = vel.v * visualScale;
          velocityVector.setDirection(hasMag ? dir : new THREE.Vector3(1, 0, 0));
          velocityVector.position.copy(origin);
          velocityVector.setLength(length, 0.2, 0.1);
          (velocityVector.line.material).color.set(mainColor);
          (velocityVector.cone.material).color.set(mainColor);
          velocityVector.visible = vel.v > 0.05;

          // Position labels at vector tips
          const vTip = origin.clone().add(dir.clone().multiplyScalar(length));
          updateLabel("vLabel", `v=${vel.v.toFixed(2)} m/s`, vTip.clone().add(new THREE.Vector3(0, 0.8, 0)), "#4facfe");

          if (state.showVelocityComponents) {
            // Vx vector along global x
            const vxDir = new THREE.Vector3(1, 0, 0);
            const vxLength = Math.abs(vel.vx) * visualScale;
            vxVector.setDirection(vxDir);
            vxVector.position.copy(origin);
            vxVector.setLength(vxLength, 0.2, 0.1);
            (vxVector.line.material).color.set(componentColor);
            (vxVector.cone.material).color.set(componentColor);
            vxVector.visible = Math.abs(vel.vx) > 0.1;
            const vxTip = origin.clone().add(new THREE.Vector3(vel.vx * visualScale, 0, 0));
            updateLabel("vxLabel", `vx=${vel.vx.toFixed(2)} m/s`, vxTip.clone().add(new THREE.Vector3(0, 0.6, 1.2)), "#cccccc");

            // Vy vector along global y
            const vyDir = new THREE.Vector3(0, Math.sign(vel.vy) || 1, 0);
            const vyLength = Math.abs(vel.vy) * visualScale;
            vyVector.setDirection(vyDir);
            vyVector.position.copy(vxTip);
            vyVector.setLength(vyLength, 0.2, 0.1);
            (vyVector.line.material).color.set(componentColor);
            (vyVector.cone.material).color.set(componentColor);
            vyVector.visible = Math.abs(vel.vy) > 0.1;
            const vyTip = vxTip.clone().add(new THREE.Vector3(0, vel.vy * visualScale, 0));
            updateLabel("vyLabel", `vy=${vel.vy.toFixed(2)} m/s`, vyTip.clone().add(new THREE.Vector3(0, 0.1, 0)), "#cccccc");

            // Vz vector along global z
            const vzDir = new THREE.Vector3(0, 0, Math.sign(vel.vz) || 1);
            const vzLength = Math.abs(vel.vz) * visualScale;
            vzVector.setDirection(vzDir);
            vzVector.position.copy(vyTip);
            vzVector.setLength(vzLength, 0.2, 0.1);
            (vzVector.line.material).color.set(componentColor);
            (vzVector.cone.material).color.set(componentColor);
            vzVector.visible = Math.abs(vel.vz) > 0.1;
            const vzTip = vyTip.clone().add(new THREE.Vector3(0, 0, vel.vz * visualScale));
            updateLabel("vzLabel", `vz=${vel.vz.toFixed(2)} m/s`, vzTip.clone().add(new THREE.Vector3(0, 0, 0.1)), "#cccccc");
          } else {
            vxVector.visible = false;
            vyVector.visible = false;
            if (vzVector) vzVector.visible = false;
            ["vxLabel", "vyLabel", "vzLabel"].forEach((k) => velocityLabels[k] && (velocityLabels[k].visible = false));
          }
        };

        if (state.isDualTrajectoryMode) {
          velocityVector.visible = false;
          vxVector.visible = false;
          vyVector.visible = false;
          if (vzVector) vzVector.visible = false;
          hideLabels();
        } else {
          const trajToUse = trajectory || (state.trajectoire.length > 0 ? state.trajectoire : state.trajectoire1); // Utilise trajectory si fourni, sinon le comportement existant
          const idxToUse = frameIndex !== undefined ? frameIndex : Math.floor(state.currentFrameIndex);

          if (trajToUse.length > 0) {
            const index = Math.min(idxToUse, trajToUse.length - 1);
            const pos = trajToUse[index];
            const vel = getVelocityAtFrame(trajToUse, index);
            drawVectorSet(pos, vel, simVecColor, compColor);
          } else {
            velocityVector.visible = false;
            vxVector.visible = false;
            vyVector.visible = false;
            if (vzVector) vzVector.visible = false;
            hideLabels();
          }
        }
      }

      function createArc(startAngle, endAngle, radius, color, plane = 'xy') {
        const points = [];
        const segments = 32;
        for (let i = 0; i <= segments; i++) {
          const angle = startAngle + (endAngle - startAngle) * (i / segments);
          let x, y, z;
          if (plane === 'xy') {
            x = radius * Math.cos(angle);
            y = radius * Math.sin(angle);
            z = 0;
          } else if (plane === 'xz') {
            x = radius * Math.cos(angle);
            y = 0;
            z = radius * Math.sin(angle);
          }
          points.push(new THREE.Vector3(x, y, z));
        }
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
        return new THREE.Line(geometry, material);
      }

      function drawV0Vector(angleDeg, color) {
        if (state.v0 <= 0) {
          v0Vector.visible = false;
          // Cacher les labels v0, alpha et beta
          if (velocityLabels["v0Label"]) velocityLabels["v0Label"].visible = false;
          if (velocityLabels["alphaLabel"]) velocityLabels["alphaLabel"].visible = false;
          if (velocityLabels["betaLabel"]) velocityLabels["betaLabel"].visible = false;
          // Cacher les arcs
          if (alphaArc) alphaArc.visible = false;
          if (betaArc) betaArc.visible = false;
          if (betaProjection) betaProjection.visible = false;
          return;
        }

        const alphaRad = toRad(angleDeg);
        const betaRad = toRad(state.outOfPlaneAngleDeg || 0);
        const visualScale = 0.3;
        const startPoint = new THREE.Vector3(0, state.h, 0);

        // Composante dans le plan (x-y) selon angle α
        const v_xy = state.v0 * Math.cos(betaRad);
        // Composante z selon angle β
        const v_z = state.v0 * Math.sin(betaRad);

        // Direction complète en 3D
        const direction = new THREE.Vector3(
          v_xy * Math.cos(alphaRad),
          v_xy * Math.sin(alphaRad),
          v_z
        ).normalize();

        const length = state.v0 * visualScale;

        v0Vector.setDirection(direction);
        v0Vector.position.copy(startPoint);
        v0Vector.setLength(length, 0.5, 0.2);
        (v0Vector.line.material).color.set(color);
        (v0Vector.cone.material).color.set(color);
        v0Vector.visible = true;

        const labelColor = color === 0x4facfe ? "#4facfe" : (color === 0xff0000 ? "#ff0000" : "#0000ff");

        // Repositionner le label v0 au milieu du vecteur (aligné le long du vecteur)
        const v0MidPoint = startPoint.clone().add(direction.clone().multiplyScalar(length * 0.5));
        // Positionner le label perpendiculairement au vecteur pour qu'il soit lisible
        const perpDir = new THREE.Vector3(-direction.y, direction.x, 0).normalize();
        updateLabel("v0Label", `v₀=${state.v0.toFixed(2)} m/s`, v0MidPoint.clone().add(perpDir.clone().multiplyScalar(0.8)), labelColor);

        // Créer l'arc pour alpha (dans le plan XY)
        const arcRadius = length * 0.4;
        if (!alphaArc) {
          alphaArc = createArc(0, alphaRad, arcRadius, color, 'xy');
          alphaArc.position.copy(startPoint);
          scene.add(alphaArc);
        } else {
          // Mettre à jour l'arc
          scene.remove(alphaArc);
          alphaArc = createArc(0, alphaRad, arcRadius, color, 'xy');
          alphaArc.position.copy(startPoint);
          scene.add(alphaArc);
        }
        alphaArc.visible = true;

        // Créer l'arc pour beta (dans le plan XZ)
        if (!betaArc) {
          betaArc = createArc(0, betaRad, arcRadius, color, 'xz');
          betaArc.position.copy(startPoint);
          scene.add(betaArc);
        } else {
          scene.remove(betaArc);
          betaArc = createArc(0, betaRad, arcRadius, color, 'xz');
          betaArc.position.copy(startPoint);
          scene.add(betaArc);
        }
        betaArc.visible = true;

        // Créer la projection du vecteur v0 sur le plan XZ
        const projectionDir = new THREE.Vector3(
          Math.cos(alphaRad) * Math.cos(betaRad),
          0,
          Math.sin(betaRad)
        ).normalize();
        if (!betaProjection) {
          const projPoints = [
            new THREE.Vector3(0, state.h, 0),
            projectionDir.clone().multiplyScalar(length).add(new THREE.Vector3(0, state.h, 0))
          ];
          const projGeometry = new THREE.BufferGeometry().setFromPoints(projPoints);
          const projMaterial = new THREE.LineDashedMaterial({ color: color, dashSize: 0.2, gapSize: 0.1 });
          betaProjection = new THREE.Line(projGeometry, projMaterial);
          betaProjection.computeLineDistances();
          scene.add(betaProjection);
        } else {
          const projPoints = [
            new THREE.Vector3(0, state.h, 0),
            projectionDir.clone().multiplyScalar(length).add(new THREE.Vector3(0, state.h, 0))
          ];
          betaProjection.geometry.setFromPoints(projPoints);
          betaProjection.computeLineDistances();
        }
        betaProjection.visible = true;

        // Ajouter des labels pour alpha et beta
        const alphaLabelPos = startPoint.clone().add(new THREE.Vector3(arcRadius * 0.7, arcRadius * 0.7, 0));
        updateLabel("alphaLabel", `α=${angleDeg.toFixed(1)}°`, alphaLabelPos, labelColor);

        const betaLabelPos = startPoint.clone().add(new THREE.Vector3(arcRadius * 0.7, 0, arcRadius * 0.7));
        const betaDeg = state.outOfPlaneAngleDeg || 0;
        updateLabel("betaLabel", `β=${betaDeg.toFixed(1)}°`, betaLabelPos, labelColor);
      }

      function draw() {
        // controls.update(); // Supprimé, géré par animationLoop
        // renderer.render(scene, camera); // Supprimé, géré par animationLoop

        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        const simColor = isDark ? "#4facfe" : "blue";
        const simVectorColor = isDark ? "rgba(79, 172, 254, 0.8)" : "rgba(0, 0, 255, 0.7)";
        const simDashColor = isDark ? "rgba(79, 172, 254, 0.5)" : "rgba(0,0,255,0.45)";

        const drawTargetMarker = (x, y, z) => {
          if (targetMesh) {
            targetMesh.position.set(x, y + 1, z); // Utiliser la coordonnée z
            targetMesh.visible = true;
          }
        };

        if (state.mode === "target") {
          drawTargetMarker(state.target.x, state.target.y, state.target.z);
          if (impactPointMesh) impactPointMesh.visible = false;
          } else {
          if (targetMesh) targetMesh.visible = false;
          if (state.dureeVol > 0 && impactPointMesh) {
            impactPointMesh.position.set(state.porteeX, state.hArrivee, state.vz0 ? state.vz0 * state.dureeVol : 0);
            impactPointMesh.visible = true;
          } else if (impactPointMesh) {
            impactPointMesh.visible = false;
          }
        }

        // Ne dessiner les trajectoires que si la simulation n'est pas en pause (ou si le mode cible est actif)
        if (!state.isPaused || state.mode === "target") {
          // Logique de dessin des trajectoires Three.js doit être ici
        }
      }
      function genererEquationParabole(angleDeg) {
        const { v0, g, h } = state;
        if (v0 <= 0 || g <= 0) return "Paramètres invalides pour l'équation.";
        const alphaRad = toRad(angleDeg);
        const cosAlpha = Math.cos(alphaRad);
        if (cosAlpha === 0) return `Tir vertical (non une parabole en y(x))`;
        const a = -g / (2 * v0 * v0 * cosAlpha * cosAlpha);
        const b = Math.tan(alphaRad);
        const c = h;
        let equation = `<i>y(x)</i> = ${a.toFixed(3)} ∙ <i>x</i>²`;
        equation += (b >= 0 ? " + " : " - ") + `${Math.abs(b).toFixed(3)} ∙ <i>x</i>`;
        equation += (c >= 0 ? " + " : " - ") + `${Math.abs(c).toFixed(2)}`;
        return equation;
      }

      function updateResultsText(dynamicHTML = "") {
        const fullHTML =
          state.dureeVol > 0
            ? state.staticResultsHTML + `<div class="dynamic-info">${dynamicHTML}</div>`
            : "<b>Trajectoire impossible.</b><br>Essayez d'augmenter la vitesse ou de baisser la hauteur d'arrivée.";
        if (resultsDisplay) resultsDisplay.innerHTML = fullHTML;
        if (resultsDisplayDesktop) resultsDisplayDesktop.innerHTML = fullHTML;
      }

      function updateTargetModeDisplays() {
        let resultsHTML = `<b>Paramètres du tir :</b>
                   <ul>
                       <li>Cible (X, Y, Z) : <b>(${state.target.x.toFixed(1)} m, ${state.target.y.toFixed(1)} m, ${state.target.z.toFixed(1)} m)</b></li>
                       <li>Vitesse initiale (v₀) : <b>${state.v0.toFixed(1)} m/s</b></li>
                       <li>Hauteur de départ (h) : <b>${state.h.toFixed(1)} m</b></li>
                   </ul>`;
        let equationHTML = "";

        if (state.solutions.length > 0) {
          resultsHTML += `<b>Résultats Clés :</b><ul>`;
          const c1 = calculerCaracteristiques(
            state.v0,
            toRad(state.solutions[0]),
            state.h,
            state.g,
            state.m,
            state.target.y
          );
          resultsHTML += `<li>Tir 1 (Rouge) : H. max <b>${c1.yMax.toFixed(2)} m</b> (à x=${c1.xSommet.toFixed(
            2
          )}m)</li>`;
          if (state.solutions.length === 2) {
            const c2 = calculerCaracteristiques(
              state.v0,
              toRad(state.solutions[1]),
              state.h,
              state.g,
              state.m,
              state.target.y
            );
            resultsHTML += `<li>Tir 2 (Violet) : H. max <b>${c2.yMax.toFixed(2)} m</b> (à x=${c2.xSommet.toFixed(
              2
            )}m)</li>`;
          }
          resultsHTML += `</ul>`;

          equationHTML = `<b>Équations des trajectoires :</b>`;
          equationHTML += `<div style="color: red; margin-top: 5px; font-size: 0.9em;"><b>Tir ${state.solutions[0].toFixed(
            2
          )}° :</b><br>${genererEquationParabole(state.solutions[0])}</div>`;
          if (state.solutions.length === 2)
            equationHTML += `<div style="color: purple; margin-top: 8px; font-size: 0.9em;"><b>Tir ${state.solutions[1].toFixed(
              2
            )}° :</b><br>${genererEquationParabole(state.solutions[1])}</div>`;
        } else {
          equationHTML = "Aucune solution trouvée pour les paramètres actuels.";
        }

        if (resultsDisplay) resultsDisplay.innerHTML = resultsHTML;
        if (resultsDisplayDesktop) resultsDisplayDesktop.innerHTML = resultsHTML; // Correction : Utilise resultsHTML
        if (equationDisplay) equationDisplay.innerHTML = equationHTML;
        if (equationDisplayDesktop) equationDisplayDesktop.innerHTML = equationHTML;
      }

      function updateEquationDisplay() {
        let equationHTML = "";
        if (state.isResistanceActive) {
          const modelText = state.dragModel === "quadratic" ? "quadratique (f ~ v²)" : "linéaire (f ~ v)";
          equationHTML = `Équations non disponibles<br>avec la résistance de l'air (${modelText}).`;
        } else {
          const { v0, alpha, g, h } = state;
          if (v0 > 0 && alpha !== 90) {
            const alphaRad = toRad(alpha);
            const tanAlpha = Math.tan(alphaRad);
            const cosAlpha = Math.cos(alphaRad);
            const gTerm = g / (2 * v0 ** 2 * cosAlpha ** 2);
            equationHTML = `<b>Équation de la trajectoire :</b><br>`;
            equationHTML += `<i>y(x)</i> = -${gTerm.toFixed(4)} ∙ <i>x</i><sup>2</sup>`;
            equationHTML += (tanAlpha >= 0 ? " + " : " - ") + `${Math.abs(tanAlpha).toFixed(3)} ∙ <i>x</i>`;
            equationHTML += (h >= 0 ? " + " : " - ") + `${Math.abs(h).toFixed(2)}`;

            const v0x = v0 * cosAlpha;
            const v0y = v0 * Math.sin(alphaRad);
            equationHTML += `<div style="margin-top: 12px;"><b>Équations de la vitesse (v⃗) :</b>`;
            equationHTML += `<br><i>vₓ(t)</i> = ${v0x.toFixed(2)} m/s`;
            equationHTML += `<br><i>vᵧ(t)</i> = -${g.toFixed(2)} ∙ <i>t</i> + ${v0y.toFixed(2)}`;
            equationHTML += `</div>`;

            equationHTML += `<div style="margin-top: 12px;"><b>Équations de l'accélération (a⃗) :</b>`;
            equationHTML += `<br><i>aₓ(t)</i> = 0 m/s²`;
            equationHTML += `<br><i>aᵧ(t)</i> = -${g.toFixed(2)} m/s²`;
            equationHTML += `</div>`;
          } else if (alpha === 90) {
            equationHTML = "Tir vertical, équations horaires plus adaptées.";
          } else {
            equationHTML = "Paramètres invalides pour le calcul des équations.";
          }
        }
        if (equationDisplay) equationDisplay.innerHTML = equationHTML;
        if (equationDisplayDesktop) equationDisplayDesktop.innerHTML = equationHTML;
      }

      function update() {
        if (state.isUpdating) return;
        state.isUpdating = true;
        cancelAnimationFrame(state.animationId);
        try {
          // Afficher la trajectoire seulement si la simulation a démarré, ou toujours en mode Cible
          // Si on modifie les paramètres en mode simulation alors que c'est en pause, on cache la trajectoire
          if (state.mode === "simulation" && state.isPaused) {
            state.simulationStarted = false;
          }
          state.showFinalTrajectory = state.mode === "target" || state.simulationStarted;
          // Si la trajectoire ne doit pas être affichée, cacher les lignes tout de suite
          if (!state.showFinalTrajectory) {
            try {
              if (mainTrajectoryLine) { mainTrajectoryLine.visible = false; mainTrajectoryLine.geometry.setFromPoints([]); }
              if (idealTrajectoryLine) { idealTrajectoryLine.visible = false; idealTrajectoryLine.geometry.setFromPoints([]); }
              if (trajectory1Line) { trajectory1Line.visible = false; trajectory1Line.geometry.setFromPoints([]); }
              if (trajectory2Line) { trajectory2Line.visible = false; trajectory2Line.geometry.setFromPoints([]); }
            } catch (e) {
              // silencieux si non initialisé
            }
          }
          ["h", "hArrivee", "g", "m", "radius", "dragCoeff"].forEach((key) => {
            if (sliders[key]) state[key] = parseFloat(sliders[key].value);
          });
          if (sliders.speed) {
            state.speedFactor = parseFloat(sliders.speed.value) * SPEED_SCALE;
            if (values.speed) values.speed.textContent = `${parseFloat(sliders.speed.value).toFixed(2)}x`;
          }
          state.isResistanceActive = resistanceCheckbox.checked;

          const graphTitle = document.getElementById("graph-title");

          if (state.isResistanceActive) {
            const modelText = state.dragModel === "quadratic" ? "(f ~ v²)" : "(f ~ v)";
            graphTitle.innerHTML = `Trajectoire du projectile<br>
                                    <span style="font-weight:normal; font-size:0.9em;">(avec frottement air ${modelText})</span>`;
          } else {
            graphTitle.innerHTML = `Trajectoire du projectile<br>
                                    <span style="font-weight:normal; font-size:0.9em;">(sans frottement air)</span>`;
          }

          if (state.mode === "simulation") {
            state.v0 = parseFloat(sliders.v0.value);
            state.alpha = parseFloat(sliders.alpha.value);
            // Lecture de l'angle out-of-plane et calcul de vz0 en mode simulation
            if (sliders.outOfPlane) {
              state.outOfPlaneAngleDeg = parseFloat(sliders.outOfPlane.value || 0);
            }
            state.vz0 = (state.v0 || 0) * Math.sin(toRad(state.outOfPlaneAngleDeg || 0));
            // En mode simulation, la caméra suit le projectile ou regarde le point d'impact initial
            controls.target.set(state.porteeX / 2, state.yMax / 2, 0); // Peut être ajusté pour une meilleure vue
          } else {
            state.v0 = parseFloat(sliders.v0Target.value);
            state.target.x = parseFloat(inputs.targetX.value);
            state.target.y = parseFloat(inputs.targetY.value);
            state.h = parseFloat(sliders.h.value);
          }

          if (state.mode === "simulation") {
            state.isDualTrajectoryMode = false;
            const alphaRad = toRad(state.alpha);
            let characteristics;
            if (state.isResistanceActive) {
              characteristics = calculerTrajectoireAvecFrottement(
                state.v0,
                alphaRad,
                state.h,
                state.g,
                state.m,
                state.hArrivee,
                state.radius,
                state.dragCoeff,
                state.airDensity,
                state.dragModel
              );
              const idealCharacteristics = calculerCaracteristiques(
                state.v0,
                alphaRad,
                state.h,
                state.g,
                state.m,
                state.hArrivee,
                state.vz0
              );
              state.idealTrajectoire = idealCharacteristics.trajectoire;
            } else {
              characteristics = calculerCaracteristiques(state.v0, alphaRad, state.h, state.g, state.m, state.hArrivee, state.vz0);
              state.enveloppe = calculerEnveloppe(state.v0, state.h, state.g);
              state.idealTrajectoire = [];
            }
            Object.assign(state, characteristics);

            state.positions = state.trajectoire.map((point, index) => ({
              x: point.x,
              y: point.y,
              z: 0, // Assume 2D plane for now
              t: index * DT,
            }));
            state.staticResultsHTML = `<b>Caractéristiques du Vol :</b><ul><li>Hauteur max : <b>${state.yMax.toFixed(
              2
            )} m</b> (à x=${state.xSommet.toFixed(2)}m)</li><li>Portée : <b>${state.porteeX.toFixed(
              2
            )} m</b></li><li>Durée du vol : <b>${state.dureeVol.toFixed(
              2
            )} s</b></li><li>Vitesse d'impact : <b>${state.vImpact.toFixed(
              2
            )} m/s</b></li></ul><div id="energy-display"><ul><li>Énergie Initiale : <b>${state.eInitiale.toFixed(
              1
            )} J</b></li><li>Énergie d'impact (Ec) : <b>${state.eImpact.toFixed(1)} J</b></li>${
              state.isResistanceActive
                ? `<li>Perte par frottement: <b>${(state.eInitiale - state.eImpact).toFixed(1)} J</b></li>`
                : ""
            }</ul></div>`;
            updateResultsText();
            updateEquationDisplay();
          }

          Object.keys(inputs).forEach((key) => {
            if (state[key] !== undefined && inputs[key]) {
              const inputElem = inputs[key];
              let precision = 0;
              if (inputElem.step && inputElem.step.includes(".")) precision = inputElem.step.split(".")[1].length;
              if (document.activeElement !== inputElem) inputElem.value = state[key].toFixed(precision);
            }
          });

          if (values.speed) values.speed.textContent = `${state.speedFactor.toFixed(1)}x`;
          const xMaxTarget = state.mode === "target" ? state.target.x : state.porteeX;
          const yMaxTarget = state.mode === "target" ? state.target.y : state.hArrivee;
          let xMaxEnv = !state.isResistanceActive && state.enveloppe.x.length > 1 ? state.enveloppe.x.slice(-1)[0] : 0;
          state.xMaxGraph = Math.max(
            10,
            state.porteeX,
            xMaxEnv,
            xMaxTarget * 1.1,
            state.trajectoire2 && state.trajectoire2.length > 0 ? state.trajectoire2.slice(-1)[0].x * 1.1 : 0
          );
          state.yMaxGraph = Math.max(
            10,
            state.yMax,
            state.hArrivee,
            !state.isResistanceActive && state.enveloppe.y.length > 1 ? Math.max(...state.enveloppe.y) : state.h,
            yMaxTarget * 1.1
          );
          // state.currentFrameIndex = 0;
          // state.isPaused = true;
          // state.animationId = null;
          // if (pauseButton) pauseButton.textContent = "Go";
          // if (mobileGoButton) mobileGoButton.textContent = "Go";
          // if (pauseButton) pauseButton.classList.remove("btn-pause");
          // if (pauseButton) pauseButton.classList.add("btn-go");
          // Supprimer l'appel à draw() ici car la boucle d'animation s'en charge
        } finally {
          state.isUpdating = false;

          const updateThreeJsLine = (line, trajectory, color) => {
            const points = trajectory.map(p => new THREE.Vector3(p.x, p.y, p.z || 0));
            line.geometry.setFromPoints(points);
            if (line.material.color) (line.material).color.set(color);
            line.visible = trajectory.length > 1;
          };

          const isDark = document.documentElement.getAttribute("data-theme") === "dark";

          // Mettre à jour les trajectoires Three.js toujours en mode target, et en mode simulation même en pause
          if (state.mode === "target" || !state.isPaused) {
            if (state.mode === "simulation") {
              updateThreeJsLine(mainTrajectoryLine, state.trajectoire, isDark ? 0x4facfe : 0x0000ff);
              updateThreeJsLine(idealTrajectoryLine, state.idealTrajectoire, 0xcccccc);
              mainTrajectoryLine.visible = state.showFinalTrajectory;
              idealTrajectoryLine.visible = state.isResistanceActive && state.showIdealTrajectory;
              trajectory1Line.visible = false;
              trajectory2Line.visible = false;
            } else if (state.mode === "target") {
              updateThreeJsLine(trajectory1Line, state.trajectoire1, 0xff0000);
              updateThreeJsLine(trajectory2Line, state.trajectoire2, 0x800080);
              // Afficher seulement si la simulation cible est lancée (showFinalTrajectory)
              const canShow = state.showFinalTrajectory && state.trajectoire1.length > 1;
              trajectory1Line.visible = canShow;
              trajectory2Line.visible = canShow && state.isDualTrajectoryMode && state.trajectoire2.length > 1;
              mainTrajectoryLine.visible = false;
              idealTrajectoryLine.visible = false;
            }
          } else if (state.mode === "simulation" && state.isPaused) {
            // Afficher les trajectoires en mode simulation même en pause
            updateThreeJsLine(mainTrajectoryLine, state.trajectoire, isDark ? 0x4facfe : 0x0000ff);
            updateThreeJsLine(idealTrajectoryLine, state.idealTrajectoire, 0xcccccc);
            mainTrajectoryLine.visible = state.showFinalTrajectory;
            idealTrajectoryLine.visible = state.isResistanceActive && state.showIdealTrajectory;
            trajectory1Line.visible = false;
            trajectory2Line.visible = false;
          } else {
            // Cacher les trajectoires si la simulation est en pause au démarrage
            mainTrajectoryLine.visible = false;
            idealTrajectoryLine.visible = false;
            trajectory1Line.visible = false;
            trajectory2Line.visible = false;
          }

          // Mettre à jour le vecteur de tir en mode simulation
          if (state.mode === "simulation") {
            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            drawV0Vector(state.alpha, isDark ? 0x4facfe : 0x0000ff);
          }
        }
      }

      function animationLoop() {
        // Mettre à jour les contrôles de la caméra et rendre la scène à chaque frame
        controls.update();
        renderer.render(scene, camera);

        // Demander la prochaine frame d'animation pour assurer une boucle continue
        requestAnimationFrame(animationLoop);

        let currentTrajectory = [];
        let currentAlpha = 0;

        if (state.mode === "simulation") {
          currentTrajectory = state.trajectoire;
          currentAlpha = state.alpha;
        } else if (state.mode === "target") {
          currentTrajectory = state.trajectoire1;
          currentAlpha = state.solutions.length > 0 ? state.solutions[0] : 0;
        }

        // Afficher les vecteurs et points d'impact même en pause
        let frameIndex = Math.floor(state.currentFrameIndex);
        drawInstantaneousVelocityVectors(state, currentTrajectory, frameIndex);

        // Masquer le cone du v0Vector en mode Cible
        if (state.mode === "target") {
          v0Vector.cone.visible = false;
        } else {
          v0Vector.cone.visible = true;
        }
        drawV0Vector(currentAlpha, (state.mode === "simulation" || state.solutions.length === 0) ? (document.documentElement.getAttribute("data-theme") === "dark" ? 0x4facfe : 0x0000ff) : 0xff0000);

        // Ne pas continuer la logique de simulation si l'animation est en pause
        if (state.isPaused) {
          // console.log("animationLoop: Paused. Skipping simulation logic.");
          return;
        }

        // console.log("animationLoop: Running. Current frame:", state.currentFrameIndex);

        let maxFrames = state.isDualTrajectoryMode
          ? Math.max(state.trajectoire1.length, state.trajectoire2.length)
          : state.trajectoire.length;

        if (state.currentFrameIndex >= maxFrames - 1 && maxFrames > 0) {
          state.currentFrameIndex = maxFrames - 1;
          cancelAnimationFrame(state.animationId);
          state.animationId = null;
          state.isPaused = true;
          if (pauseButton) pauseButton.textContent = "Go";
          if (mobileGoButton) mobileGoButton.textContent = "Go";
          if (pauseButton) pauseButton.classList.remove("btn-pause");
          if (pauseButton) pauseButton.classList.add("btn-go");

          if (state.mode === "target") {
            updateTargetModeDisplays();
          } else {
            updateResultsText("✓ Terminé");
          }

          console.log("animationLoop: Animation terminée.");
          return;
        }

        state.currentFrameIndex += state.speedFactor;

        if (state.mode === "simulation") {
          currentTrajectory = state.trajectoire;
          currentAlpha = state.alpha;
        } else if (state.mode === "target") {
          currentTrajectory = state.trajectoire1;
          currentAlpha = state.solutions.length > 0 ? state.solutions[0] : 0;
        }

        frameIndex = Math.floor(state.currentFrameIndex);
          const t = frameIndex * DT;

        if (currentTrajectory.length > 0) {
          const frame = currentTrajectory[frameIndex];

          if (frame) {
            // En mode cible, force un z constant (cible) si absent
            const z = state.mode === "target"
              ? (frame.z !== undefined ? frame.z : state.target.z || 0)
              : (frame.z || 0);
            projectileMesh.position.set(frame.x, frame.y, z);
            const Ep = state.m * state.g * frame.y;
            const Ec_approx = state.eInitiale - Ep > 0 ? state.eInitiale - Ep : 0;

            let dynamicText = `<b>t = ${t.toFixed(2)}s</b>, x = ${frame.x.toFixed(1)}m, y = ${frame.y.toFixed(1)}m`;

            if (state.mode === "simulation") {
              dynamicText += `<div id="energy-display"><ul>` +
                `<li>Ec : <b>~${Ec_approx.toFixed(1)} J</b></li>` +
                `<li>Ep : <b>${Ep.toFixed(1)} J</b></li>` +
                             `</ul></div>`;
            }
            updateResultsText(dynamicText);
          }

          // Mise à jour des lignes (et du marqueur) selon le mode
          if (state.mode === "simulation") {
            const points = currentTrajectory.slice(0, frameIndex + 1).map(p => new THREE.Vector3(p.x, p.y, p.z || 0));
            mainTrajectoryLine.geometry.setFromPoints(points);
            mainTrajectoryLine.visible = true;
            trajectory1Line.visible = false;
            trajectory2Line.visible = false;
            if (trajectory1Marker) trajectory1Marker.visible = false;
            if (trajectory2Marker) trajectory2Marker.visible = false;
          } else {
            // mode cible : on met à jour les deux trajectoires et on ne touche pas à mainTrajectoryLine
          const points1 = state.trajectoire1
            .slice(0, frameIndex + 1)
            .map(p => new THREE.Vector3(p.x, p.y, p.z !== undefined ? p.z : (state.target.z || 0)));
            trajectory1Line.geometry.setFromPoints(points1);
            trajectory1Line.visible = state.showFinalTrajectory && state.trajectoire1.length > 1;

            if (state.isDualTrajectoryMode && state.trajectoire2.length > 1) {
              const points2 = state.trajectoire2
                .slice(0, frameIndex + 1)
                .map(p => new THREE.Vector3(p.x, p.y, p.z !== undefined ? p.z : (state.target.z || 0)));
              trajectory2Line.geometry.setFromPoints(points2);
              trajectory2Line.visible = state.showFinalTrajectory;
            } else {
              trajectory2Line.visible = false;
            }
            // positionner des marqueurs rouges/violets, en clampant l'index pour éviter les positions undefined
            const clampIndex = (arr) => {
              if (!arr || !arr.length) return null;
              const idx = Math.min(Math.max(0, frameIndex), arr.length - 1);
              return arr[idx];
            };

            if (trajectory1Marker) {
              const p = clampIndex(state.trajectoire1);
              if (p) {
                const z = p.z !== undefined ? p.z : (state.target.z || 0);
                trajectory1Marker.position.set(p.x, p.y, z);
                trajectory1Marker.visible = state.showFinalTrajectory && state.trajectoire1.length > 0;
              } else {
                trajectory1Marker.visible = false;
              }
            }

            if (trajectory2Marker) {
              const p2 = clampIndex(state.trajectoire2);
              if (p2 && state.isDualTrajectoryMode && state.trajectoire2.length > 1) {
                const z2 = p2.z !== undefined ? p2.z : (state.target.z || 0);
                trajectory2Marker.position.set(p2.x, p2.y, z2);
                trajectory2Marker.visible = state.showFinalTrajectory && state.trajectoire2.length > 1;
              } else {
                trajectory2Marker.visible = false;
              }
            }
            mainTrajectoryLine.visible = false;
            idealTrajectoryLine.visible = false;
          }
        } else {
          projectileMesh.position.set(0, state.h, state.vz0 ? state.vz0 * state.dureeVol : 0);
          mainTrajectoryLine.visible = false;
          if (trajectory1Marker) trajectory1Marker.visible = false;
          if (trajectory2Marker) trajectory2Marker.visible = false;
        }
      }

      function calculateTargetSolutions() {
        console.log("calculateTargetSolutions: Start");
        if (solutionsDisplay) clearSolutions();
        state.showFinalTrajectory = false;
        state.isDualTrajectoryMode = false;
        state.currentFrameIndex = 0;
        const v0 = parseFloat(sliders.v0Target.value);
        const g = parseFloat(sliders.g.value);
        const h = parseFloat(sliders.h.value);
        state.v0 = v0;
        state.h = h;
        state.target.x = parseFloat(inputs.targetX.value);
        state.target.y = parseFloat(inputs.targetY.value);
        state.target.z = parseFloat(inputs.targetZ.value); // Mettre à jour la coordonnée z de la cible
        // Compute vz0 from out-of-plane angle in target mode
        if (sliders.outOfPlane) {
          state.outOfPlaneAngleDeg = parseFloat(sliders.outOfPlane.value || 0);
        }
        state.vz0 = (state.v0 || 0) * Math.sin(toRad(state.outOfPlaneAngleDeg || 0));
        const { target } = state;

        if (target.x <= 0) {
          if (solutionsDisplay) solutionsDisplay.innerHTML = `<p style="color:var(--reset-color);">La Cible X doit être > 0.</p>`;
          updateTargetModeDisplays();
          draw();
          console.log("calculateTargetSolutions: Cible X <= 0, returning.");
          return;
        }

        const A = (g * target.x ** 2) / (2 * v0 ** 2);
        const B = -target.x;
        const C = target.y - h + A;
        const delta = B ** 2 - 4 * A * C;

        if (delta < 0) {
          const v0_min = calculerVitesseMinimale(g, target.x, target.y, h);
          let message = `<p style-top: 5px;">Vitesse minimale requise : <br><b>~${v0_min.toFixed(2)} m/s</b></p>`;
          if (v0_min !== null)
            message += `<p style-top: 5px;">Vitesse minimale requise : <br><b>~${v0_min.toFixed(2)} m/s</b></p>`;
          solutionsDisplay.innerHTML = message;
          state.trajectoire = [];
          state.trajectoire1 = [];
          state.trajectoire2 = [];
          console.log("calculateTargetSolutions: Delta < 0, aucune solution.");
        } else {
          const T1 = (-B + Math.sqrt(delta)) / (2 * A);
          const T2 = (-B - Math.sqrt(delta)) / (2 * A);
          state.solutions = []; // Vider les solutions précédentes
          [T1, T2].forEach((T) => {
            const alpha = toDeg(Math.atan(T));
            if (alpha >= -90 && alpha <= 90) state.solutions.push(alpha);
          });
          state.solutions.sort((a, b) => b - a);
          console.log("calculateTargetSolutions: Solutions trouvées:", state.solutions);

          // If target.z is set (non-zero), compute required vz0 to reach that z at impact time
          if (target.z && target.z !== 0 && state.solutions.length > 0) {
            // Use the first solution to compute required vz0
            const angle = state.solutions[0];
            const alphaRad = toRad(angle);
            const cosAlpha = Math.cos(alphaRad);
            if (cosAlpha > 1e-9) {
              const flightTime = target.x / (v0 * cosAlpha);
              // Required vz0 = target.z / flightTime
              const required_vz0 = target.z / flightTime;
              const required_beta_rad = Math.asin(Math.max(-1, Math.min(1, required_vz0 / v0)));
              const required_beta_deg = toDeg(required_beta_rad);
              console.log(`Target.z detected: flightTime=${flightTime.toFixed(2)}s, required_vz0=${required_vz0.toFixed(2)} m/s, required_beta=${required_beta_deg.toFixed(1)}°`);
              // Update state directly and UI controls
              state.vz0 = required_vz0;
              state.outOfPlaneAngleDeg = required_beta_deg;
              if (sliders.outOfPlane) sliders.outOfPlane.value = required_beta_deg;
              if (inputs.outOfPlane) inputs.outOfPlane.value = required_beta_deg;
            }
          }

          if (state.solutions.length === 0) {
            if (solutionsDisplay) solutionsDisplay.innerHTML = `<p>Aucune solution valide.</p>`;
          } else {
            console.log("calculateTargetSolutions: Entering main solutions ELSE block. solutions.length:", state.solutions.length);
            if (solutionsDisplay) solutionsDisplay.innerHTML = "";
            const characteristics1 = calculerCaracteristiques(v0, toRad(state.solutions[0]), h, g, state.m, target.y, state.vz0);
            console.log("calculateTargetSolutions: Characteristics 1 returned. Trajectoire length:", characteristics1.trajectoire.length);
            let traj1 = characteristics1.trajectoire;
            // console.log("calculateTargetSolutions: traj1 after initial assignment (from characteristics1):", traj1.length);
            const targetIndex1 = traj1.findIndex((p) => p.x >= target.x);
            // console.log("calculateTargetSolutions: targetIndex1:", targetIndex1, "for target.x:", target.x);
            if (targetIndex1 !== -1) {
              // console.log("calculateTargetSolutions: Modifying traj1 based on targetIndex1. Before slice length:", traj1.length);
              traj1 = traj1.slice(0, targetIndex1 + 1);
              const tAtTarget1 = targetIndex1 * DT;
              traj1[traj1.length - 1] = { x: target.x, y: target.y, z: state.vz0 * tAtTarget1 };
              // console.log("calculateTargetSolutions: traj1 after slice and target point update length:", traj1.length);
            } else {
              console.log("calculateTargetSolutions: targetIndex1 is -1, traj1 not sliced.");
            }
            // Recaler pour démarrer à l'origine (x=0,z=0) et interpoler z de 0 -> target.z le long du trajet
            const mapTrajectory = (traj) => {
              if (!traj.length) return [];
              const offsetX = traj[0].x || 0;
              const n = traj.length;
              return traj.map((p, idx) => {
                const progress = n > 1 ? idx / (n - 1) : 0;
                return {
                  ...p,
                  x: p.x - offsetX,                // départ en x=0
                  z: (state.target.z || 0) * progress, // z 0 -> target.z
                };
              });
            };
            const mapped1 = mapTrajectory(traj1);
            state.trajectoire1 = mapped1;
            console.log("calculateTargetSolutions: Trajectoire 1 final length (after assignment to state):", state.trajectoire1.length);

            if (state.solutions.length === 2) {
              state.isDualTrajectoryMode = true;
              const characteristics2 = calculerCaracteristiques(v0, toRad(state.solutions[1]), h, g, state.m, target.y, state.vz0);
              let traj2 = characteristics2.trajectoire;
              const targetIndex2 = traj2.findIndex((p) => p.x >= target.x);
              if (targetIndex2 !== -1) {
                traj2 = traj2.slice(0, targetIndex2 + 1);
                const tAtTarget2 = targetIndex2 * DT;
                traj2[traj2.length - 1] = { x: target.x, y: target.y, z: state.target.z || 0 };
              }
              const mapped2 = mapTrajectory(traj2);
              state.trajectoire2 = mapped2;
              console.log("calculateTargetSolutions: Trajectoire 2:", state.trajectoire2);
              const yMax = Math.max(characteristics1.yMax, characteristics2.yMax, target.y, h);
              state.xMaxGraph = Math.max(10, target.x * 1.1);
              state.yMaxGraph = Math.max(10, yMax * 1.1);
            } else {
              state.isDualTrajectoryMode = false;
              state.xMaxGraph = Math.max(10, target.x * 1.1);
              state.yMaxGraph = Math.max(10, characteristics1.yMax * 1.1, target.y * 1.1, h);
            }
          }
        }
        updateTargetModeDisplays();
        draw();
        drawV0Vector(state.solutions[0], document.documentElement.getAttribute("data-theme") === "dark" ? 0x4facfe : 0x0000ff);

        console.log("calculateTargetSolutions: End. Trajectoire1 length:", state.trajectoire1.length, "isDualTrajectoryMode:", state.isDualTrajectoryMode);
      }

      function clearSolutions() {
        if (solutionsDisplay) solutionsDisplay.innerHTML = "";
        state.solutions = [];
        state.trajectoire = [];
        state.trajectoire1 = [];
        state.trajectoire2 = [];
        state.isDualTrajectoryMode = false;
      }

      function toggleAnimation() {
        console.log("toggleAnimation: Before state.isPaused change. Current mode:", state.mode, "isPaused:", state.isPaused);
        if (state.mode === "target" && state.solutions.length === 0) {
          console.log("toggleAnimation: Mode target sans solution. Annulation.");
          return;
        }
        if (state.mode === "simulation" && state.dureeVol <= 0) {
          console.log("toggleAnimation: Mode simulation sans dureeVol. Annulation.");
          return;
        }

        if (state.isPaused) {
          let maxFrames = state.isDualTrajectoryMode
            ? Math.max(state.trajectoire1.length, state.trajectoire2.length)
            : state.trajectoire.length;
          if (state.currentFrameIndex >= maxFrames - 1 && maxFrames > 0) state.currentFrameIndex = 0;
          state.showFinalTrajectory = true;
        }

        state.isPaused = !state.isPaused;

        // Marquer que la simulation a démarré quand on passe de pause à running
        if (!state.isPaused) {
          state.simulationStarted = true;
          state.showFinalTrajectory = true; // autoriser l'affichage des lignes une fois lancée
        }

        console.log("toggleAnimation: After state.isPaused change. New isPaused:", state.isPaused);

        if (state.isPaused) {
          cancelAnimationFrame(state.animationId);
          if (pauseButton) pauseButton.textContent = "Resume";
          if (mobileGoButton) mobileGoButton.textContent = "Resume";
          if (pauseButton) pauseButton.classList.remove("btn-pause");
          if (pauseButton) pauseButton.classList.add("btn-go");
          openPanel();
        } else {
          state.startTime = Date.now();
          if (pauseButton) pauseButton.textContent = "Pause";
          if (mobileGoButton) mobileGoButton.textContent = "Pause";
          if (pauseButton) pauseButton.classList.remove("btn-go");
          if (pauseButton) pauseButton.classList.add("btn-pause");
          closePanel();
          animationLoop();
        }
      }

        }

        if (!trajectoire || trajectoire.length === 0) return null;
        let maxIdx = 0;
        for (let i = 1; i < trajectoire.length; i++) if (trajectoire[i].y > trajectoire[maxIdx].y) maxIdx = i;
        return trajectoire[maxIdx];
      }

        const updateDragCoeffFromShape = () => {
          const selectedRadio = document.querySelector('input[name="projectileShape"]:checked');
          state.projectileShape = selectedRadio ? selectedRadio.value : "sphere";

          if (dragCoeffControl) {
          if (state.projectileShape === "custom") {
            dragCoeffControl.classList.remove("disabled-by-shape");
              if (inputs.dragCoeff) inputs.dragCoeff.disabled = false;
              if (sliders.dragCoeff) sliders.dragCoeff.disabled = false;
          } else {
            dragCoeffControl.classList.add("disabled-by-shape");
              if (inputs.dragCoeff) inputs.dragCoeff.disabled = true;
              if (sliders.dragCoeff) sliders.dragCoeff.disabled = true;
            state.dragCoeff = DRAG_COEFF_PRESETS[state.projectileShape] || 0.47;
              if (inputs.dragCoeff) inputs.dragCoeff.value = state.dragCoeff.toFixed(2);
              if (sliders.dragCoeff) sliders.dragCoeff.value = state.dragCoeff;
            }
          }
          update();
        };

        projectileShapeRadios.forEach((radio) => {
          radio.addEventListener("change", updateDragCoeffFromShape);
        });

        linkSliderInput(sliders.dragCoeff, inputs.dragCoeff, update);

        updateDragCoeffFromShape();

        openBtn = document.getElementById("openBtn");
        panel = document.getElementById("panel");

        if (openBtn) {
          openBtn.addEventListener("click", togglePanel);
        }

        const closePanelHeaderBtn = document.getElementById("closePanelHeaderBtn");
        if (closePanelHeaderBtn) {
          closePanelHeaderBtn.addEventListener("click", togglePanel);
        }

        const themeToggleBtn = document.getElementById("themeToggleBtn");
        if (themeToggleBtn) {
          themeToggleBtn.addEventListener("click", toggleTheme);
        }

      }

      /* =========================================
       LOGIQUE THEME DARK / LIGHT
       ========================================= */
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);

        updateThemeIcon(newTheme);
        updateThreeJsTheme(newTheme);
      }

      function updateThemeIcon(theme) {
        const btn = document.getElementById("themeToggleBtn");
        if (btn) {
          btn.textContent = theme === "dark" ? "🌙" : "☀️";
        }
      }

      function updateThreeJsTheme(theme) {
        const isDark = theme === "dark";

        // Scene background
        scene.background = isDark ? new THREE.Color(0x121212) : new THREE.Color(0xf0f0f0);

        // Projectile color
        if (projectileMesh) {
          (projectileMesh.material).color.set(isDark ? 0x4facfe : 0x0000ff);
        }

        // Target color
        if (targetMesh) {
          (targetMesh.material).color.set(isDark ? 0xe44d26 : 0xe44d26);
        }

        // Trajectory lines colors
        if (mainTrajectoryLine) {
          (mainTrajectoryLine.material).color.set(isDark ? 0x4facfe : 0x0000ff);
        }
        if (idealTrajectoryLine) {
          (idealTrajectoryLine.material).color.set(isDark ? 0xcccccc : 0x888888);
        }
        if (trajectory1Line) {
          (trajectory1Line.material).color.set(0xff0000);
        }
        if (trajectory2Line) {
          (trajectory2Line.material).color.set(0x800080);
        }

        // GridHelper color
        if (gridHelper) {
          // setColors is no longer a function, recreate GridHelper if colors need to change
          if (scene.children.includes(gridHelper)) {
            scene.remove(gridHelper);
          }
          const gridColorCenter = isDark ? 0x444444 : 0xcccccc;
          const gridColorGrid = isDark ? 0x222222 : 0xaaaaaa;
          gridHelper = new THREE.GridHelper(100, 100, gridColorCenter, gridColorGrid);
          scene.add(gridHelper);
        }
      }

      /* =========================================
       DÉMARRAGE
       ========================================= */
      document.addEventListener("DOMContentLoaded", () => {
      setupCanvas();
        setupEventListeners(); // Initialisation de sliders et inputs ici
        console.log("DOMContentLoaded: Sliders initialized:", sliders);
        console.log("DOMContentLoaded: Inputs initialized:", inputs);
      setMode("simulation");
      reset();
        // Afficher le vecteur de tir initial
        drawV0Vector(state.alpha, 0x0000ff);
        animationLoop();
          // Pause/lecture avec la barre espace
          window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
              e.preventDefault();
              toggleAnimation();
            }
          });
        // Initialisation du thème après que la scène Three.js soit initialisée
        (function initTheme() {
          const savedTheme = localStorage.getItem("theme") || "dark";
          if (!localStorage.getItem("theme")) {
            localStorage.setItem("theme", "dark");
          }
          document.documentElement.setAttribute("data-theme", savedTheme);
          updateThemeIcon(savedTheme);
          updateThreeJsTheme(savedTheme);
          draw();
        })();
      });
    </script>
  </body>
</html>
